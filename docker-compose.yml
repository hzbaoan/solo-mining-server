services:
  solo-mining-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: solo-mining-server:latest
    container_name: solo-mining-server
    restart: unless-stopped
    ports:
      - "3333:3333"
      - "7152:7152"
    volumes:
      - ./config.json:/etc/solo-mining-server/config.json:ro
